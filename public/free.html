<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Free Production - Japanese Trainer</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
</head>
<body>
  <nav>
    <span class="logo">Japanese Trainer</span>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/free.html" class="active">Free Production</a>
      <a href="/drill.html">Targeted Drills</a>
    </div>
  </nav>

  <div class="container">
    <!-- Prompt -->
    <div id="prompt-area">
      <div class="prompt-card" id="prompt-card" style="display: none;">
        <div class="domain-tag" id="prompt-domain"></div>
        <div class="jp-text-large" id="prompt-japanese"></div>
        <div class="prompt-actions">
          <button class="btn-tts-prompt" id="btn-tts-prompt" title="Listen to prompt">&#x1F50A;</button>
          <button class="btn-translation-toggle" id="btn-translation-toggle">訳</button>
        </div>
        <div class="translation" id="prompt-translation" style="display: none;"></div>
      </div>

      <div id="generate-area" style="text-align: center; padding: 40px 0;">
        <button class="btn btn-primary" id="btn-generate" style="max-width: 300px; width: 100%;">
          Start Free Production
        </button>
      </div>

      <div class="loading" id="loading-generate" style="display: none;">
        <div class="spinner"></div>
        <div>Generating prompt...</div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-area" style="display: none;">
      <div class="input-area">
        <textarea
          id="user-input"
          placeholder="日本語で答えてください..."
          rows="2"
          lang="ja"
        ></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn-voice" id="btn-voice" title="Hold to record">
          <span id="mic-icon">&#x1F3A4;</span>
        </button>
        <button class="btn btn-primary" id="btn-submit" disabled>
          Submit
        </button>
      </div>

      <div id="voice-status" style="font-size: 0.85em; color: var(--text-muted); margin-bottom: 12px; display: none;"></div>
    </div>

    <!-- Grading loading -->
    <div class="loading" id="loading-grade" style="display: none;">
      <div class="spinner"></div>
      <div>Grading response...</div>
    </div>

    <!-- Result -->
    <div class="result-card" id="result-card">
      <div class="result-header" id="result-header"></div>

      <div class="score-breakdown" id="score-breakdown">
        <div class="score-item">
          <div class="score-value" id="score-grammar">--</div>
          <div class="score-label">Grammar</div>
        </div>
        <div class="score-item">
          <div class="score-value" id="score-meaning">--</div>
          <div class="score-label">Completeness</div>
        </div>
        <div class="score-item">
          <div class="score-value" id="score-naturalness">--</div>
          <div class="score-label">Naturalness</div>
        </div>
      </div>

      <div class="target">
        <div class="label">Your response</div>
        <div class="jp-text" id="result-user-response"></div>
      </div>

      <div id="result-good" class="what-was-good" style="display: none;"></div>

      <div id="result-corrections" class="corrections" style="display: none;"></div>

      <div class="explanation" id="result-explanation"></div>

      <ul class="errors-list" id="result-errors"></ul>

      <div id="result-alternatives" class="alternatives" style="display: none;">
        <div class="label">Alternative expressions</div>
        <ul id="alternatives-list"></ul>
      </div>

      <div id="result-vocab-opps" class="vocab-opps" style="display: none;">
        <div class="label">Vocabulary you could have used</div>
        <ul id="vocab-opps-list"></ul>
      </div>

      <div style="margin-top: 16px; text-align: center;">
        <button class="btn btn-primary" id="btn-next" style="max-width: 250px; width: 100%;">
          Next Prompt
        </button>
      </div>
    </div>

    <!-- Follow-up Chat -->
    <div id="chat-area" style="display: none;">
      <div class="card chat-card">
        <h2>Ask about this drill</h2>
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Why is X wrong? / Can I also say...?" />
          <button class="btn btn-primary" id="btn-chat-send" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script src="/js/free.js"></script>
</body>
</html>
